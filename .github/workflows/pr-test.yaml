name: PR Test Workflow

on:
    pull_request:
        branches:
            - "**"

jobs:
    lint:
        name: Lint Code
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.x"

            - name: Install Dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install ruff djlint

            - name: Run Ruff
              run: ruff check .

            - name: Run DjLint
              run: djlint --check web/templates

    test:
        name: Run Tests
        runs-on: ubuntu-latest
        needs: lint
        if: false # Disabled till tests are added
        steps:
            - name: Checkout Code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.x"

            - name: Install Dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run Tests
              run: pytest

    docker-build:
        name: Build and Test Docker Image
        runs-on: ubuntu-latest
        # needs: test
        needs: lint
        steps:
            - name: Checkout Code
              uses: actions/checkout@v3

            - name: Build Docker Image
              run: docker build -t test-image .

            - name: Inspect Docker Image
              run: docker inspect test-image

            - name: Run Docker Container
              run: docker run --rm test-image
